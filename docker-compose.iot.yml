# IoT stack: EMQX (MQTT), Redpanda (Kafka-compatible), PostgreSQL, Redis
# Usage: docker compose -f docker-compose.iot.yml up -d

services:
  emqx:
    image: emqx/emqx:5.8.0
    container_name: water-emqx
    ports:
      - "1883:1883"    # MQTT
      - "8883:8883"    # MQTT/TLS (configure in prod)
      - "18083:18083"  # Dashboard (admin/public)
    environment:
      EMQX_ALLOW_ANONYMOUS: "true"
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: public
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    container_name: water-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 5

  redpanda-init:
    image: redpandadata/redpanda:v24.2.4
    container_name: water-redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        rpk topic create telemetry.water.raw.v1 -p 3 -r 1 --brokers redpanda:9092 || true
        rpk topic create telemetry.water.validated.v1 -p 3 -r 1 --brokers redpanda:9092 || true
        rpk topic create telemetry.water.aggregated.v1 -p 3 -r 1 --brokers redpanda:9092 || true
        rpk topic create alerts.water.iot.v1 -p 3 -r 1 --brokers redpanda:9092 || true
        echo "Kafka topics ready"

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: water-postgres
    environment:
      POSTGRES_USER: water
      POSTGRES_PASSWORD: water
      POSTGRES_DB: water_iot
    ports:
      - "5432:5432"
    volumes:
      - ./iot/sql/init_telemetry.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U water -d water_iot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: water-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
